services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bantaybaha-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bantaybaha}
      POSTGRES_USER: ${POSTGRES_USER:-bantaybaha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bantaybaha} -d ${POSTGRES_DB:-bantaybaha}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
